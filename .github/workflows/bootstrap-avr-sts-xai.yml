name: Bootstrap avr-sts-xai Docker publish
on:
  workflow_dispatch:
jobs:
  publish:
    name: publish avr-sts-xai and sync repo secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: agentvoiceresponse/avr-sts-xai
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: verify connector
        run: |
          npm ci
          node --check index.js
          node --check loadTools.js
      - name: login to docker hub
        env:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: docker login -u "$username" -p "$password"
      - name: get-npm-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1
      - name: build and push docker image
        run: |
          docker build \
            -t agentvoiceresponse/avr-sts-xai:latest \
            -t agentvoiceresponse/avr-sts-xai:${{ steps.package-version.outputs.current-version }} \
            .
          docker push agentvoiceresponse/avr-sts-xai:latest
          docker push agentvoiceresponse/avr-sts-xai:${{ steps.package-version.outputs.current-version }}
      - name: sync docker hub secrets to avr-sts-xai
        uses: actions/github-script@v7
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
        with:
          script: |
            const sodium = require('tweetsodium');
            const owner = 'agentvoiceresponse';
            const repo = 'avr-sts-xai';

            async function setRepoSecret(name, value) {
              const { data: key } = await github.rest.actions.getRepoPublicKey({ owner, repo });
              const encrypted = sodium(Buffer.from(value), Buffer.from(key.key, 'base64'));
              await github.rest.actions.createOrUpdateRepoSecret({
                owner,
                repo,
                secret_name: name,
                encrypted_value: Buffer.from(encrypted).toString('base64'),
                key_id: key.key_id,
              });
            }

            await setRepoSecret('DOCKERHUB_USERNAME', process.env.DOCKERHUB_USERNAME);
            await setRepoSecret('DOCKERHUB_PASSWORD', process.env.DOCKERHUB_PASSWORD);
