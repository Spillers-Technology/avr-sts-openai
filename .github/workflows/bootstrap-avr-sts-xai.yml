name: Bootstrap avr-sts-xai Docker publish
on:
  workflow_dispatch:
jobs:
  publish:
    name: publish avr-sts-xai and sync repo secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: agentvoiceresponse/avr-sts-xai
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: verify connector
        run: |
          npm ci
          node --check index.js
          node --check loadTools.js
      - name: login to docker hub
        env:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}
        run: docker login -u "$username" -p "$password"
      - name: get-npm-version
        id: package-version
        uses: martinbeentjes/npm-get-version-action@v1.3.1
      - name: build and push docker image
        run: |
          docker build \
            -t agentvoiceresponse/avr-sts-xai:latest \
            -t agentvoiceresponse/avr-sts-xai:${{ steps.package-version.outputs.current-version }} \
            .
          docker push agentvoiceresponse/avr-sts-xai:latest
          docker push agentvoiceresponse/avr-sts-xai:${{ steps.package-version.outputs.current-version }}
      - name: dispatch docker hub secret import to avr-sts-xai
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_PASSWORD: ${{ secrets.DOCKERHUB_PASSWORD }}
          GH_TOKEN: ${{ secrets.GH_ADMIN_PAT }}
        run: |
          payload=$(python3 -c 'import json,os; print(json.dumps({
            "event_type": "import-docker-secrets",
            "client_payload": {
              "username": os.environ["DOCKERHUB_USERNAME"],
              "password": os.environ["DOCKERHUB_PASSWORD"],
            },
          }))')
          curl -fsSL -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/agentvoiceresponse/avr-sts-xai/dispatches" \
            -d "$payload"
